<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPL 2026 — Random Pick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen overflow-x-hidden bg-black text-[#00ff41]">
    <!-- Run locally: cd random-picker && python3 -m http.server 8080 -->
    <!-- AWS Amplify: set app root to random-picker/ and deploy -->

    <canvas id="matrix-canvas" aria-hidden="true"></canvas>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="relative z-10 mx-auto flex min-h-screen max-w-3xl flex-col px-4 py-8 sm:px-6">
      <header class="mb-8 text-center">
        <p class="matrix-label mb-2 text-xs uppercase tracking-[0.35em] text-[#00ff41]/70">
          IPL 2026
        </p>
        <h1 class="matrix-title text-3xl font-bold uppercase tracking-wider sm:text-4xl">
          Random Pick
        </h1>
      </header>

      <section class="matrix-panel mb-6 rounded-lg p-6 sm:p-8">
        <p id="status-line" class="mb-4 text-center text-sm text-[#00ff41]/80">
          Establishing link…
        </p>

        <div class="mb-6 text-center">
          <p id="scramble-label" class="matrix-label mb-2 text-xs uppercase tracking-widest text-[#00ff41]/60">
            Awaiting selection
          </p>
          <p id="display-name" class="matrix-display text-2xl font-bold sm:text-3xl">—</p>
          <p id="display-email" class="mt-2 font-mono text-sm text-[#00ff41]/90 sm:text-base">—</p>
          <p id="display-meta" class="mt-2 text-xs text-[#00ff41]/50"></p>
        </div>

        <div class="flex justify-center">
          <button id="pick-btn" type="button" class="matrix-btn px-8 py-2.5 uppercase tracking-widest" disabled>
            Pick
          </button>
        </div>

        <p id="hint-line" class="mt-4 text-center text-sm text-[#00ff41]/70"></p>
      </section>

      <section class="matrix-panel mb-6 rounded-lg p-6">
        <h2 id="picked-heading" class="matrix-label mb-4 text-sm uppercase tracking-widest">
          Winners (0/10)
        </h2>
        <ol id="picked-list" class="space-y-3 font-mono text-sm">
          <li class="text-[#00ff41]/40">No winners yet.</li>
        </ol>
      </section>

      <footer class="mt-auto flex justify-center pb-4">
        <button id="reset-btn" type="button" class="matrix-btn matrix-btn-secondary px-6 py-2 uppercase tracking-widest" disabled>
          Reset All
        </button>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
